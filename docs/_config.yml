# Theme Configuration
theme: just-the-docs
# remote_theme: just-the-docs/just-the-docs # Only for GitHub Pages

# Site Settings
title: TGraph Backend Generator
description: Generate NestJS APIs and React Admin dashboards from Prisma schemas
# baseurl: "" # Not needed for local development
url: 'http://localhost:4000' # Local development

# Logo
logo: '/logo.png'

# Color Scheme
color_scheme: light # Use built-in light theme

# Custom CSS (purple accents)
custom_css:
  - '/assets/css/custom.css'

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux Links (top right)
aux_links:
  'TGraph on GitHub':
    - 'https://github.com/trugraph/backend-generator'
  'npm Package':
    - 'https://www.npmjs.com/package/@tgraph/backend-generator'

# Footer
footer_content: 'Copyright &copy; 2025 TGraph. Distributed under the <a href="https://github.com/trugraph/backend-generator/blob/main/LICENSE">ISC License</a>.'

# Back to top link
back_to_top: true
back_to_top_text: 'Back to top'

# External navigation links
nav_external_links:
  - title: GitHub
    url: https://github.com/trugraph/backend-generator
    hide_icon: false

# Collections for organizing content (optional)
collections:
  guides:
    permalink: '/:collection/:path/'
    output: true
  recipes:
    permalink: '/:collection/:path/'
    output: true
  api:
    permalink: '/:collection/:path/'
    output: true

# Callouts (for notes, warnings, etc)
callouts:
  note:
    color: blue
  warning:
    color: yellow
  important:
    color: purple
